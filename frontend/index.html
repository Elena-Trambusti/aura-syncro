    <style>
      *,*::before,*::after{box-sizing:border-box}
      html{-webkit-text-size-adjust:100%;background:#0B0E14}
      body{margin:0;min-height:100dvh;background:#0B0E14;color:#E8DFC7;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100dvh;background:#0B0E14;position:relative;z-index:1}
      #static-landing-fcp{position:fixed;inset:0;z-index:0;background:#020202;pointer-events:none}
      #static-landing-fcp .fcp-nav{height:calc(3.25rem + env(safe-area-inset-top,0px));border-bottom:1px solid rgba(212,175,55,0.12)}
      #static-landing-fcp .fcp-hero{padding:calc(5.5rem + env(safe-area-inset-top,0px)) 1rem 6rem;max-width:72rem;margin:0 auto}
      #static-landing-fcp .fcp-badge{height:2.75rem;width:14rem;border-radius:9999px;background:rgba(255,255,255,0.04);margin-bottom:2rem}
      #static-landing-fcp .fcp-title{min-height:clamp(4.5rem,12vw,7.5rem);max-width:36rem;margin-bottom:1.75rem}
      #static-landing-fcp .fcp-sub{min-height:4.5rem;max-width:28rem}
      #static-landing-seo{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
      #pwa-boot-shell{
        display:none;position:fixed;inset:0;z-index:2147483646;
        flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;
        background:#0B0E14;color:#E8DFC7;padding:1.5rem;padding-top:max(1.5rem,env(safe-area-inset-top));
        padding-bottom:max(1.5rem,env(safe-area-inset-bottom));text-align:center
      }
      #pwa-boot-shell .boot-spinner{
        width:3rem;height:3rem;border-radius:9999px;
        border:4px solid rgba(212,175,55,0.25);border-top-color:#D4AF37;
        animation:boot-spin 0.9s linear infinite
      }
      @keyframes boot-spin{to{transform:rotate(360deg)}}
      #pwa-boot-shell .boot-title{font-size:1.125rem;font-weight:700;color:#F5ECD8;margin:0}
      #pwa-boot-shell .boot-msg{font-size:0.875rem;color:#A89B7A;margin:0;max-width:20rem;line-height:1.5}
      #pwa-boot-shell .boot-actions{display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:center;margin-top:0.5rem}
      #pwa-boot-shell button{
        font:inherit;cursor:pointer;border-radius:0.75rem;padding:0.65rem 1rem;
        font-size:0.8125rem;font-weight:600;border:1px solid rgba(255,255,255,0.12)
      }
      #pwa-boot-shell .boot-btn-primary{background:#C9A227;color:#0B0E14;border-color:#C9A227}
      #pwa-boot-shell .boot-btn-secondary{background:#12151C;color:#E8DFC7}
      html.pwa-standalone #pwa-boot-shell{display:flex}
    </style>
  </head>
  <body>
    <main class="seo-static-shell" id="static-landing-seo">
      <p><strong>Aura Syncro — Software cloud per la ristorazione</strong></p>
      <p>Aura Syncro è il software cloud per la ristorazione in Italia, Spagna e Isole Canarie: tavoli, comande e incassi sincronizzati in tempo reale. Fiscale a norma, servizio fluido, controllo totale ogni sera.</p>
    </main>
    <div id="static-landing-fcp" aria-hidden="true">
      <div class="fcp-nav"></div>
      <div class="fcp-hero">
        <div class="fcp-badge"></div>
        <div class="fcp-title"></div>
        <div class="fcp-sub"></div>
      </div>
    </div>
    <div id="pwa-boot-shell" role="status" aria-live="polite">
      <div class="boot-spinner" aria-hidden="true"></div>
      <p class="boot-title">Aura Syncro</p>
      <p class="boot-msg" data-boot-msg>Caricamento in corso…</p>
      <div class="boot-actions">
        <button type="button" class="boot-btn-primary" onclick="window.__auraResetApp && window.__auraResetApp()">Ripristina app</button>
        <button type="button" class="boot-btn-secondary" onclick="location.replace('/login?pwa=1')">Vai al login</button>
      </div>
    </div>
    <script>
      (function () {
        function isAppShell() {
          var standalone = window.matchMedia('(display-mode: standalone)').matches
            || window.matchMedia('(display-mode: fullscreen)').matches
            || window.matchMedia('(display-mode: minimal-ui)').matches
            || window.navigator.standalone === true
            || document.referrer.indexOf('android-app://') === 0
            || location.search.indexOf('pwa=') !== -1;
          try {
            if (localStorage.getItem('aura-installed-app') === '1') standalone = true;
          } catch (e) {}
          return standalone;
        }

        window.__auraResetApp = function () {
          try { localStorage.clear(); sessionStorage.clear(); } catch (e) {}
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { r.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) { caches.delete(k); });
            });
          }
          location.replace('/login?pwa=1&reset=1');
        };

        var appShell = isAppShell();
        if (appShell) {
          try { localStorage.setItem('aura-installed-app', '1'); } catch (e) {}
          document.documentElement.classList.add('pwa-standalone');
          document.getElementById('static-landing-fcp')?.remove();

          var p = (location.pathname.replace(/\/$/, '') || '/');
          if (['/', '/it', '/es', '/es-cn'].indexOf(p) !== -1) {
            location.replace('/login?pwa=1');
          }
        } else {
          var path = (location.pathname.replace(/\/$/, '') || '/');
          if (!['/', '/it', '/es', '/es-cn'].includes(path)) {
            document.getElementById('static-landing-fcp')?.remove();
          }
        }

        setTimeout(function () {
          var root = document.getElementById('root');
          var hasReact = root && root.children.length > 0;
          if (!hasReact && appShell) {
            var shell = document.getElementById('pwa-boot-shell');
            if (shell) {
              shell.style.display = 'flex';
              var msg = shell.querySelector('[data-boot-msg]');
              if (msg) msg.textContent = 'L\'app non si è avviata. Premi Ripristina app.';
            }
          }
        }, 7000);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
