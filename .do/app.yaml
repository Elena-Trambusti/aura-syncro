# App Spec — DigitalOcean App Platform
# Import: Dashboard → Apps → Create → "Import from App Spec" → incolla questo file
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: aura-syncro
region: fra

services:
  - name: api
    github:
      repo: Elena-Trambusti/aura-syncro
      branch: main
      deploy_on_push: true
    source_dir: backend
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-s
    http_port: 8080
    build_command: npm ci && npm run build
    # migrate deploy anche in start (package.json) — doppia sicurezza se il job pre-deploy fallisce
    run_command: npm start
    health_check:
      http_path: /api/health/ready
      initial_delay_seconds: 45
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
        scope: BUILD_TIME
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: FRONTEND_URL
        value: https://aurasyncro.com,https://www.aurasyncro.com
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PUBLISHABLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_SETUP
        scope: RUN_TIME
        type: SECRET
      - key: STRIPE_PRICE_SUBSCRIPTION
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: VAPID_PUBLIC_KEY
        scope: RUN_TIME
        type: SECRET
      - key: VAPID_PRIVATE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: VAPID_SUBJECT
        value: mailto:aurasyncro@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: aurasyncro@gmail.com
      - key: SMTP_PASS
        scope: RUN_TIME
        type: SECRET
      - key: EMAIL_FROM
        value: "Aura Syncro <aurasyncro@gmail.com>"
      - key: POS_USE_SIMULATION
        value: "true"
      - key: POS_ALLOW_SIMULATION
        value: "true"
      - key: MARKETING_SCHEDULER_MS
        value: "3600000"

# Migrazioni Prisma PRIMA di ogni deploy — blocca il rollout se il DB non è allineato
jobs:
  - name: prisma-migrate
    kind: PRE_DEPLOY
    github:
      repo: Elena-Trambusti/aura-syncro
      branch: main
      deploy_on_push: true
    source_dir: backend
    environment_slug: node-js
    instance_size_slug: basic-xxs
    build_command: npm ci
    run_command: npx prisma migrate deploy
    envs:
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
        scope: BUILD_TIME
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
