name: CI — Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Business logic tests (Vitest)
        run: npm run test:vitest

      - name: Backend unit tests
        working-directory: backend
        run: npm run test:legacy

      - name: Typecheck backend
        working-directory: backend
        run: npx tsc --noEmit

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc -b

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Playwright smoke (public)
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: https://aurasyncro.com
        run: npx playwright test e2e/smoke.spec.ts

  e2e-authenticated:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: aura
          POSTGRES_DB: aura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aura:aura@localhost:5432/aura_test
      DIRECT_URL: postgresql://aura:aura@localhost:5432/aura_test
      JWT_SECRET: ci-jwt-secret-for-e2e-tests-only
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: development
      PREMIUM_DEV_UNLOCK: 'true'
      POS_ALLOW_SIMULATION: 'true'
      E2E_EMAIL: admin@demo-it.com
      E2E_PASSWORD: admin123
      E2E_RESTAURANT_SLUG: demo-it

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Prepare database (migrate + seed demo)
        working-directory: backend
        run: |
          npx prisma generate
          npx tsx scripts/ensure-baseline-migration.ts
          npx prisma migrate deploy
          npm run db:seed

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Playwright E2E autenticato (locale)
        working-directory: frontend
        run: npx playwright test e2e/order-flow.spec.ts e2e/premium-ops.spec.ts

  production-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Verify production API health
        working-directory: backend
        run: npm run verify:production
